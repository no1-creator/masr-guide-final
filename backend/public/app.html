<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Masr Guide — Live App</title>
<style>
:root{--blue:#159A8F;--blue-soft:#E2F3F0;--blue-h:#0F847A;--green:#46A171;--green-soft:#E8F1EC;--gold:#C79A3B;--orange:#D5803B;--orange-soft:#FBEBDE;--red:#E56458;--text:#2C2C2B;--text2:#7D7A75;--border:#E6E5E3;--soft:#F9F8F7;--soft2:#F0EFED;--r:12px;--r-sm:8px}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--soft)}
a{color:var(--blue);text-decoration:none}
.container{max-width:1160px;margin:0 auto;padding:0 20px}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.hdr{display:flex;align-items:center;gap:16px;height:64px}
.brand{font-weight:800;font-size:20px;color:var(--blue);display:flex;align-items:center;gap:8px;cursor:pointer}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold)}
.grow{flex:1}
.btn{border:none;border-radius:var(--r-sm);padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer;background:var(--blue);color:#fff}
.btn:hover{background:var(--blue-h)}
.btn.ghost{background:var(--soft2);color:var(--text)}
.btn.ghost:hover{background:var(--border)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn.danger{background:var(--red)}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--blue-soft);color:var(--blue-h);border-radius:999px;padding:6px 14px;font-weight:600;font-size:13px}
.tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.tag.pending{background:var(--orange-soft);color:var(--orange)}
.tag.confirmed{background:var(--blue-soft);color:var(--blue-h)}
.tag.completed{background:var(--green-soft);color:var(--green)}
.tag.cancelled{background:#f4dddd;color:var(--red)}
.tag.approved{background:var(--green-soft);color:var(--green)}
.tag.rejected{background:#f4dddd;color:var(--red)}
.tag.suspended{background:var(--soft2);color:var(--text2)}
section{padding:26px 0}
h2{font-size:22px;margin:0 0 4px}
.eyebrow{color:var(--blue);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.muted{color:var(--text2)}
.slider{position:relative;border-radius:var(--r);overflow:hidden;height:260px;background:#ddd;margin-bottom:8px}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .5s;background-size:cover;background-position:center;cursor:pointer}
.slide.on{opacity:1}
.slide .cap{position:absolute;left:0;right:0;bottom:0;padding:40px 26px 20px;background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff}
.slide .cap h3{margin:0 0 6px;font-size:24px}
.dots{position:absolute;bottom:14px;right:20px;display:flex;gap:8px}
.dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer}
.dots i.on{background:#fff}
.snav{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.85);border:none;font-size:18px;cursor:pointer}
.snav.l{left:14px}.snav.r{right:14px}
.cats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.cat{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.cat:hover{border-color:var(--blue);color:var(--blue)}
.cat .ci{width:16px;height:16px;flex:0 0 auto}
.cat.on .ci{stroke:#fff}
.cat.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 18px}
.filters input,.filters select{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px}
.filters input{flex:1;min-width:180px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.08)}
.card .img{height:160px;background-size:cover;background-position:center;background-color:#e9e9e9;position:relative}
.card .feat{position:absolute;top:10px;left:10px;background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px}
.card .body{padding:14px}
.card .t{font-weight:700;margin:0 0 4px}
.card .loc{color:var(--text2);font-size:13px}
.card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.card .price{font-weight:800;color:var(--blue)}
.card .price small{font-weight:500;color:var(--text2)}
.star{color:var(--gold);font-weight:700;font-size:13px}
.hero{height:300px;border-radius:var(--r);background-size:cover;background-position:center;background-color:#e9e9e9;margin-bottom:10px}
.gallery{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.gth{width:92px;height:64px;border-radius:var(--r-sm);background-size:cover;background-position:center;cursor:pointer;border:2px solid transparent}
.gth.on{border-color:var(--blue)}
.two{display:grid;grid-template-columns:1fr 320px;gap:24px}
.box{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px}
.dash{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.dnav{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px}
.dnav button{display:block;width:100%;text-align:left;border:none;background:none;padding:10px 12px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer;color:var(--text)}
.dnav button.on{background:var(--blue-soft);color:var(--blue-h)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat .n{font-size:26px;font-weight:800;color:var(--blue)}
.stat .l{color:var(--text2);font-size:13px;margin-top:2px}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
th{background:var(--soft);font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
tr:last-child td{border-bottom:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:var(--r);max-width:520px;width:100%;max-height:90vh;overflow:auto;padding:24px}
.modal h3{margin:0 0 16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:inherit}
.row{display:flex;gap:10px}.row>*{flex:1}
.imgs{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.imgs .th{position:relative;width:76px;height:56px;border-radius:6px;background-size:cover;background-position:center;background-color:#eee}
.imgs .th b{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;width:18px;height:18px;border-radius:50%;font-size:12px;line-height:18px;text-align:center;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--r-sm);z-index:200;opacity:0;transition:opacity .3s;font-size:14px}
.toast.on{opacity:1}
.hidden{display:none!important}
.qr{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;display:inline-block}
.linkbox{display:flex;gap:8px;margin-top:8px}
.linkbox input{flex:1;font-family:monospace;font-size:13px}
@media(max-width:860px){.two{grid-template-columns:1fr}.dash{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class='container hdr'>
  <div class='brand' onclick='goHome()'><span class='dot'></span> Masr Guide</div>
  <span class='muted' style='font-size:13px'>Live API demo</span>
  <div class='grow'></div>
  <button class='btn ghost sm hidden' id='dash-btn' onclick='openDash()'>Dashboard</button>
  <span id='user-chip'></span>
  <button class='btn sm' id='login-btn' onclick='openLogin()'>Log in</button>
</div></header>

<main class='container'>
  <div id='public-view'>
    <section>
      <div class='slider' id='slider'></div>
    </section>
    <section style='padding-top:0'>
      <div class='eyebrow'>Domestic Trips</div>
      <h2>Explore experiences across Egypt</h2>
      <div class='cats' id='cats'></div>
      <div class='filters'>
        <input id='q' placeholder='Search trips, cities...' oninput='debouncedLoad()'>
        <select id='sort' onchange='loadServices()'>
          <option value=''>Recommended</option>
          <option value='price_asc'>Price: low to high</option>
          <option value='price_desc'>Price: high to low</option>
          <option value='rating'>Top rated</option>
          <option value='newest'>Newest</option>
        </select>
      </div>
      <div class='grid' id='grid'></div>
    </section>
  </div>

  <div id='detail-view' class='hidden'><section>
    <button class='btn ghost sm' onclick='goHome()'>← Back</button>
    <div id='detail-body' style='margin-top:14px'></div>
  </section></div>

  <div id='dash-view' class='hidden'><section>
    <button class='btn ghost sm' onclick='goHome()'>← Back to site</button>
    <h2 style='margin-top:12px' id='dash-title'>Dashboard</h2>
    <div class='dash' style='margin-top:14px'>
      <div class='dnav' id='dnav'></div>
      <div id='dmain'></div>
    </div>
  </section></div>
</main>

<div class='overlay' id='login-modal'><div class='modal'>
  <h3 id='login-title'>Log in</h3>
  <div id='login-body'>
    <div class='field'><label>Email</label><input id='li-email' placeholder='admin@masrguide.com'></div>
    <div class='field'><label>Password</label><input id='li-pass' type='password' placeholder='admin123'></div>
    <div id='reg-extra' class='hidden'>
      <div class='field'><label>Name</label><input id='li-name'></div>
      <div class='field'><label>Account type</label><select id='li-role'><option value='customer'>Tourist</option><option value='vendor'>Service provider</option></select></div>
    </div>
    <div class='row' style='margin-top:6px'>
      <button class='btn' id='li-submit' onclick='doAuth()'>Log in</button>
      <button class='btn ghost' onclick='closeModal("login-modal")'>Cancel</button>
    </div>
    <p class='muted' style='font-size:13px;margin-top:14px' id='li-switch'></p>
    <p class='muted' style='font-size:12px;margin-top:8px'>Demo: admin@masrguide.com / admin123 · vendor@rodina.com / vendor123 · ivan@aff.com / aff123 · tourist@example.com / tourist123</p>
  </div>
</div></div>

<div class='overlay' id='book-modal'><div class='modal'>
  <h3>Book this trip</h3>
  <div class='field'><label>Date</label><input id='bk-date' type='date'></div>
  <div class='field'><label>Guests</label><input id='bk-pax' type='number' value='1' min='1'></div>
  <p class='muted' id='bk-ref' style='font-size:13px'></p>
  <div class='row'><button class='btn' onclick='submitBooking()'>Confirm booking</button><button class='btn ghost' onclick='closeModal("book-modal")'>Cancel</button></div>
</div></div>

<div class='overlay' id='svc-modal'><div class='modal'>
  <h3 id='svc-title'>New service</h3>
  <input type='hidden' id='sf-id'>
  <div class='field'><label>Title</label><input id='sf-title'></div>
  <div class='row'>
    <div class='field'><label>Category</label><select id='sf-cat'></select></div>
    <div class='field'><label>Location</label><input id='sf-loc'></div>
  </div>
  <div class='row'>
    <div class='field'><label>Price (EGP)</label><input id='sf-price' type='number'></div>
    <div class='field'><label>Duration</label><input id='sf-dur' placeholder='8h'></div>
  </div>
  <div class='field'><label>Description</label><textarea id='sf-desc' rows='3'></textarea></div>
  <div class='field'><label>Images (unlimited)</label>
    <input type='file' id='sf-file' accept='image/*' multiple onchange='sfUpload(event)'>
    <div class='imgs' id='sf-imgs'></div>
  </div>
  <label style='font-size:13px'><input type='checkbox' id='sf-feat'> Featured</label>
  <div class='row' style='margin-top:14px'><button class='btn' onclick='saveService()'>Save</button><button class='btn ghost' onclick='closeModal("svc-modal")'>Cancel</button></div>
</div></div>

<div class='overlay' id='mkt-modal'><div class='modal'>
  <h3>New marketer</h3>
  <div class='field'><label>Name</label><input id='mk-name'></div>
  <div class='field'><label>Email</label><input id='mk-email'></div>
  <div class='row'>
    <div class='field'><label>Password</label><input id='mk-pass' placeholder='changeme123'></div>
    <div class='field'><label>Commission %</label><input id='mk-rate' type='number' value='5'></div>
  </div>
  <div class='field'><label>Referral code (optional)</label><input id='mk-code' placeholder='auto'></div>
  <div class='row' style='margin-top:6px'><button class='btn' onclick='saveMarketer()'>Create</button><button class='btn ghost' onclick='closeModal("mkt-modal")'>Cancel</button></div>
</div></div>

<div class='overlay' id='ban-modal'><div class='modal'>
  <h3 id='ban-title'>New banner</h3>
  <input type='hidden' id='bn-id'>
  <div class='field'><label>Title</label><input id='bn-title'></div>
  <div class='field'><label>Image URL</label><input id='bn-image' placeholder='/img/redsea.png'></div>
  <div class='field'><label>Links to trip</label><select id='bn-svc'></select></div>
  <label style='font-size:13px'><input type='checkbox' id='bn-active' checked> Active</label>
  <div class='row' style='margin-top:14px'><button class='btn' onclick='saveBanner()'>Save</button><button class='btn ghost' onclick='closeModal("ban-modal")'>Cancel</button></div>
</div></div>

<div class='toast' id='toast'></div>

<script>
const API='';
let TOKEN=localStorage.getItem('mg_token')||'';
let USER=JSON.parse(localStorage.getItem('mg_user')||'null');
let REF=localStorage.getItem('mg_ref')||'';
let CATS=[],CUR_CAT='',CUR_SVC=null,SF_IMGS=[],LOGIN_MODE='login';

(()=>{const u=new URL(location.href);const r=u.searchParams.get('ref');if(r){REF=r;localStorage.setItem('mg_ref',r);api('/api/track/'+encodeURIComponent(r),{method:'POST'}).catch(()=>{});}})();

async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(TOKEN) h['Authorization']='Bearer '+TOKEN;
  const res=await fetch(API+path,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||('HTTP '+res.status));
  return data;
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
function closeModal(id){document.getElementById(id).classList.remove('on');}
function openModal(id){document.getElementById(id).classList.add('on');}
function money(n){return Number(n).toLocaleString()+' EGP';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderAuth(){
  const chip=document.getElementById('user-chip'),lb=document.getElementById('login-btn'),db=document.getElementById('dash-btn');
  if(USER){chip.innerHTML=`<span class='chip'>${esc(USER.name||USER.email)} · ${USER.role}</span>`;lb.textContent='Log out';lb.onclick=logout;db.classList.toggle('hidden',USER.role==='customer');}
  else{chip.innerHTML='';lb.textContent='Log in';lb.onclick=openLogin;db.classList.add('hidden');}
}
function openLogin(){LOGIN_MODE='login';syncLogin();openModal('login-modal');}
function syncLogin(){
  const reg=LOGIN_MODE==='register';
  document.getElementById('login-title').textContent=reg?'Create account':'Log in';
  document.getElementById('li-submit').textContent=reg?'Sign up':'Log in';
  document.getElementById('reg-extra').classList.toggle('hidden',!reg);
  document.getElementById('li-switch').innerHTML=reg?`Have an account? <a href='#' onclick='LOGIN_MODE="login";syncLogin();return false'>Log in</a>`:`New here? <a href='#' onclick='LOGIN_MODE="register";syncLogin();return false'>Create account</a>`;
}
async function doAuth(){
  const email=document.getElementById('li-email').value.trim(),password=document.getElementById('li-pass').value;
  try{
    let r;
    if(LOGIN_MODE==='register'){r=await api('/api/auth/register',{method:'POST',body:{email,password,name:document.getElementById('li-name').value,role:document.getElementById('li-role').value}});}
    else{r=await api('/api/auth/login',{method:'POST',body:{email,password}});}
    TOKEN=r.token;USER=r.user;localStorage.setItem('mg_token',TOKEN);localStorage.setItem('mg_user',JSON.stringify(USER));
    closeModal('login-modal');renderAuth();toast('Welcome, '+(USER.name||USER.email));
    if(USER.role!=='customer') openDash();
  }catch(e){toast(e.message);}
}
function logout(){TOKEN='';USER=null;localStorage.removeItem('mg_token');localStorage.removeItem('mg_user');renderAuth();goHome();}

function goHome(){show('public-view');}
function show(id){['public-view','detail-view','dash-view'].forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==id));window.scrollTo(0,0);}
let SLIDES=[],slideI=0,slideTimer=null;
async function loadSlider(){
  try{SLIDES=await api('/api/banners');}catch{SLIDES=[];}
  const s=document.getElementById('slider');
  if(!SLIDES.length){s.style.display='none';return;}
  s.style.display='block';
  s.innerHTML=SLIDES.map((b,i)=>`<div class='slide ${i===0?'on':''}' style='background-image:url(${b.image})' onclick='${b.service?`openDetail(${b.service.id})`:''}'><div class='cap'><h3>${esc(b.title)}</h3>${b.service?`<span class='btn sm'>Book now →</span>`:''}</div></div>`).join('')
    +`<button class='snav l' onclick='event.stopPropagation();slideBy(-1)'>‹</button><button class='snav r' onclick='event.stopPropagation();slideBy(1)'>›</button>`
    +`<div class='dots'>${SLIDES.map((b,i)=>`<i class='${i===0?'on':''}' onclick='event.stopPropagation();slideTo(${i})'></i>`).join('')}</div>`;
  slideI=0;clearInterval(slideTimer);slideTimer=setInterval(()=>slideBy(1),5000);
}
function slideTo(i){slideI=(i+SLIDES.length)%SLIDES.length;document.querySelectorAll('#slider .slide').forEach((el,x)=>el.classList.toggle('on',x===slideI));document.querySelectorAll('#slider .dots i').forEach((el,x)=>el.classList.toggle('on',x===slideI));}
function slideBy(d){slideTo(slideI+d);}
async function loadCats(){
  CATS=await api('/api/categories');
  document.getElementById('cats').innerHTML=`<div class='cat ${CUR_CAT===''?'on':''}' onclick="pickCat('')">${iconSvg('all')}All</div>`+CATS.map(c=>`<div class='cat ${CUR_CAT===c.key?'on':''}' onclick="pickCat('${c.key}')">${iconSvg(c.icon)}${esc(c.labels.en||c.key)}</div>`).join('');
}
function pickCat(k){CUR_CAT=k;loadCats();loadServices();}
const ICONS={
  all:`<rect x='3' y='3' width='7' height='7' rx='1'/><rect x='14' y='3' width='7' height='7' rx='1'/><rect x='3' y='14' width='7' height='7' rx='1'/><rect x='14' y='14' width='7' height='7' rx='1'/>`,
  plane:`<path d='M22 2 11 13'/><path d='M22 2 15 22l-4-9-9-4 20-7z'/>`,
  file:`<path d='M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z'/><path d='M14 3v5h5'/><path d='M9 15l2 2 3-4'/>`,
  car:`<path d='M3 12l2-5a2 2 0 0 1 1.9-1.3h10.2A2 2 0 0 1 19 7l2 5v5a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H6v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-5z'/><circle cx='7' cy='14.5' r='1.1'/><circle cx='17' cy='14.5' r='1.1'/>`,
  bed:`<path d='M2 8v11'/><path d='M2 13h18a2 2 0 0 1 2 2v4'/><path d='M6 13V9a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v4'/>`,
  compass:`<circle cx='12' cy='12' r='9'/><path d='M16 8l-2.6 5.4L8 16l2.6-5.4L16 8z'/>`,
  landmark:`<path d='M3 21h18'/><path d='M5 21V10'/><path d='M9 21V10'/><path d='M15 21V10'/><path d='M19 21V10'/><path d='M12 3 3 8h18z'/>`,
  ship:`<path d='M3 15l1.4 5a1 1 0 0 0 .96.7h13.3a1 1 0 0 0 .96-.7L21 15'/><path d='M5 15V9a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v6'/><path d='M12 4v4'/><path d='M9 8V6h6v2'/>`,
  waves:`<path d='M2 8c2 0 2 1.6 4 1.6S8 8 10 8s2 1.6 4 1.6S16 8 18 8s2 1.6 4 1.6'/><path d='M2 14c2 0 2 1.6 4 1.6S8 14 10 14s2 1.6 4 1.6S16 14 18 14s2 1.6 4 1.6'/>`,
  mountain:`<path d='M3 20h18L14 7l-3 5-2-2.5L3 20z'/>`,
  key:`<circle cx='8' cy='15' r='4'/><path d='M11 12l8-8'/><path d='M16 5l2 2'/><path d='M19 8l1.5-1.5'/>`,
  user:`<circle cx='12' cy='8' r='4'/><path d='M4.5 20a7.5 7.5 0 0 1 15 0'/>`,
  phone:`<rect x='7' y='3' width='10' height='18' rx='2'/><path d='M11 18h2'/>`,

function iconSvg(n){return `<svg class='ci' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'>${ICONS[n]||ICONS.compass}</svg>`;}
let dbT=null;function debouncedLoad(){clearTimeout(dbT);dbT=setTimeout(loadServices,300);}
async function loadServices(){
  const q=document.getElementById('q').value,sort=document.getElementById('sort').value;
  const params=new URLSearchParams();if(CUR_CAT)params.set('cat',CUR_CAT);if(q)params.set('q',q);if(sort)params.set('sort',sort);
  const list=await api('/api/services?'+params.toString());
  document.getElementById('grid').innerHTML=list.map(s=>`<div class='card' onclick='openDetail(${s.id})'><div class='img' style='background-image:url(${s.cover||''})'>${s.featured?`<span class='feat'>Featured</span>`:''}</div><div class='body'><div class='t'>${esc(s.title)}</div><div class='loc'>📍 ${esc(s.location)}</div><div class='meta'><span class='star'>★ ${s.rating} <small class='muted'>(${s.reviews_count})</small></span><span class='price'>${money(s.price)} <small>/ ${esc(s.duration||'')}</small></span></div></div></div>`).join('')||`<p class='muted'>No trips found.</p>`;
}
async function openDetail(id){
  const s=await api('/api/services/'+id);CUR_SVC=s;
  const imgs=s.images.length?s.images:[s.cover].filter(Boolean);
  let reviews=[];try{reviews=await api('/api/reviews?service_id='+id);}catch{}
  document.getElementById('detail-body').innerHTML=`
    <div class='hero' id='d-hero' style='background-image:url(${imgs[0]||''})'></div>
    <div class='gallery'>${imgs.map((u,i)=>`<div class='gth ${i===0?'on':''}' style='background-image:url(${u})' onclick='heroPick(${i})'></div>`).join('')}</div>
    <div class='two'>
      <div>
        <div class='eyebrow'>${esc(s.vendor?s.vendor.name:'')}</div>
        <h2>${esc(s.title)}</h2>
        <p class='muted'>📍 ${esc(s.location)} · ⏱ ${esc(s.duration||'')} · ★ ${s.rating} (${s.reviews_count})</p>
        <p>${esc(s.description)}</p>
        <div class='box' style='margin-top:16px'><b>Availability</b><p class='muted' style='font-size:13px;margin:6px 0 0'>${s.availability.slice(0,8).map(a=>a.date).join(' · ')||'Contact provider'}</p></div>
        <div class='box' style='margin-top:16px'><b>Reviews (${reviews.length})</b>${reviews.length?reviews.map(r=>`<p style='margin:8px 0 0'><span class='star'>★ ${r.rating}</span> ${esc(r.comment||'')} <span class='muted'>— ${esc(r.name||'Guest')}</span></p>`).join(''):`<p class='muted' style='margin:6px 0 0'>No reviews yet.</p>`}</div>
      </div>
      <div>
        <div class='box'>
          <div class='price' style='font-size:26px;font-weight:800;color:var(--blue)'>${money(s.price)}</div>
          <div class='muted' style='font-size:13px'>per person</div>
          <button class='btn' style='width:100%;margin-top:14px' onclick='openBooking()'>Book now</button>
          ${REF?`<p class='muted' style='font-size:12px;margin-top:8px'>Referral: <b>${esc(REF)}</b></p>`:''}
        </div>
      </div>
    </div>`;
  window.__imgs=imgs;show('detail-view');
}
function heroPick(i){document.getElementById('d-hero').style.backgroundImage='url('+window.__imgs[i]+')';document.querySelectorAll('#detail-view .gth').forEach((e,x)=>e.classList.toggle('on',x===i));}
function openBooking(){if(!USER){toast('Please log in to book');openLogin();return;}document.getElementById('bk-ref').textContent=REF?('Referral code applied: '+REF):'';openModal('book-modal');}
async function submitBooking(){
  try{const b=await api('/api/bookings',{method:'POST',body:{service_id:CUR_SVC.id,date:document.getElementById('bk-date').value||null,pax:Number(document.getElementById('bk-pax').value)||1,referral_code:REF||null}});
    closeModal('book-modal');toast('Booked! Ref '+b.ref);}catch(e){toast(e.message);}
}

const NAV={admin:['overview','vendors','services','banners','marketers','bookings'],vendor:['overview','services','marketers','bookings','wallet','profile'],affiliate:['overview','link','bookings','wallet']};
let DSEC='overview';
function openDash(){if(!USER||USER.role==='customer'){toast('No dashboard for this role');return;}DSEC='overview';document.getElementById('dash-title').textContent=({admin:'Admin',vendor:'Provider',affiliate:'Marketer'}[USER.role])+' Dashboard';renderNav();show('dash-view');loadSec();}
function renderNav(){document.getElementById('dnav').innerHTML=NAV[USER.role].map(s=>`<button class='${s===DSEC?'on':''}' onclick="navTo('${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`).join('');}
function navTo(s){DSEC=s;renderNav();loadSec();}
function card(html){return `<div class='box'>${html}</div>`;}
async function loadSec(){
  const m=document.getElementById('dmain');m.innerHTML=`<p class='muted'>Loading...</p>`;
  try{await SEC[USER.role+':'+DSEC](m);}catch(e){m.innerHTML=`<p class='muted'>${esc(e.message)}</p>`;}
}
const SEC={
  'admin:overview':async(m)=>{const o=await api('/api/admin/overview');m.innerHTML=`<div class='stats'>
    <div class='stat'><div class='n'>${o.vendors}</div><div class='l'>Providers</div></div>
    <div class='stat'><div class='n'>${o.services}</div><div class='l'>Services</div></div>
    <div class='stat'><div class='n'>${o.affiliates}</div><div class='l'>Marketers</div></div>
    <div class='stat'><div class='n'>${o.bookings}</div><div class='l'>Bookings</div></div>
    <div class='stat'><div class='n'>${money(o.revenue)}</div><div class='l'>Revenue</div></div>
    <div class='stat'><div class='n'>${money(o.platform_commission)}</div><div class='l'>Platform commission</div></div></div>
    <h3>Recent bookings</h3>${tbl(['Ref','Trip','Amount','Status'],o.recent_bookings.map(b=>[b.ref,esc(b.title),money(b.amount),statusTag(b.status)]))}
    <h3 style='margin-top:20px'>Top marketers</h3>${tbl(['Name','Code','Clicks','Bookings'],o.top_affiliates.map(a=>[esc(a.name),a.code,a.clicks,a.bookings]))}`;},
  'admin:vendors':async(m)=>{const v=await api('/api/vendors');m.innerHTML=`<h3>Service providers</h3>${tbl(['Name','City','Email','Status','Action'],v.map(x=>[esc(x.name),esc(x.city||''),esc(x.email),statusTag(x.status),`<button class='btn sm' onclick='setVendor(${x.id},"approved")'>Approve</button> <button class='btn sm ghost' onclick='setVendor(${x.id},"suspended")'>Suspend</button>`]))}`;},
  'admin:services':async(m)=>{const s=await api('/api/services');m.innerHTML=`<h3>All services (${s.length})</h3>${tbl(['Title','Location','Price','Rating'],s.map(x=>[esc(x.title),esc(x.location),money(x.price),'★ '+x.rating]))}`;},
  'admin:banners':async(m)=>{const b=await api('/api/banners?all=1');m.innerHTML=`<div style='display:flex;justify-content:space-between;align-items:center'><h3>Ad banners</h3><button class='btn sm' onclick='openBanner()'>+ New banner</button></div>${tbl(['Title','Trip','Active','Action'],b.map(x=>[esc(x.title),x.service?esc(x.service.title):'—',x.active?'✅':'—',`<button class='btn sm ghost' onclick='openBanner(${x.id})'>Edit</button> <button class='btn sm danger' onclick='delBanner(${x.id})'>Delete</button>`]))}`;},
  'admin:marketers':async(m)=>{const a=await api('/api/affiliates');m.innerHTML=`<h3>All marketers</h3>${tbl(['Name','Code','Rate','Clicks'],a.map(x=>[esc(x.name),x.code,(x.commission_rate*100)+'%',x.clicks]))}`;},
  'admin:bookings':async(m)=>{const b=await api('/api/bookings');m.innerHTML=bookingsTable(b);},
  'vendor:overview':async(m)=>{const b=await api('/api/bookings');const w=await api('/api/wallets/me').catch(()=>({balance:0}));const rev=b.reduce((s,x)=>s+x.amount,0);m.innerHTML=`<div class='stats'><div class='stat'><div class='n'>${b.length}</div><div class='l'>Bookings</div></div><div class='stat'><div class='n'>${money(rev)}</div><div class='l'>Gross sales</div></div><div class='stat'><div class='n'>${money(w.balance)}</div><div class='l'>Wallet balance</div></div></div><h3>Recent bookings</h3>${bookingsTable(b.slice(0,8))}`;},
  'vendor:services':async(m)=>{await ensureCats();const all=await api('/api/services');const me=await api('/api/vendors/me').catch(()=>null);const mine=me?all.filter(s=>s.vendor_id===me.id):all;m.innerHTML=`<div style='display:flex;justify-content:space-between;align-items:center'><h3>My services</h3><button class='btn sm' onclick='openService()'>+ New service</button></div>${tbl(['Title','Category','Price','Images','Action'],mine.map(s=>[esc(s.title),catName(s.category_id),money(s.price),s.images.length,`<button class='btn sm ghost' onclick='openService(${s.id})'>Edit</button> <button class='btn sm danger' onclick='delService(${s.id})'>Delete</button>`]))}`;},
  'vendor:marketers':async(m)=>{const a=await api('/api/affiliates');m.innerHTML=`<div style='display:flex;justify-content:space-between;align-items:center'><h3>My marketers</h3><button class='btn sm' onclick='openModal("mkt-modal")'>+ New marketer</button></div>${tbl(['Name','Code','Rate','Clicks','Action'],a.map(x=>[esc(x.name),x.code,(x.commission_rate*100)+'%',x.clicks,`<button class='btn sm danger' onclick='delAff(${x.id})'>Remove</button>`]))}`;},
  'vendor:bookings':async(m)=>{const b=await api('/api/bookings');m.innerHTML=bookingsTable(b,true);},
  'vendor:wallet':async(m)=>{await walletView(m);},
  'vendor:profile':async(m)=>{const v=await api('/api/vendors/me');m.innerHTML=card(`<h3>Business profile</h3><div class='field'><label>Name</label><input id='vp-name' value='${esc(v.name)}'></div><div class='field'><label>City</label><input id='vp-city' value='${esc(v.city||'')}'></div><div class='field'><label>Languages</label><input id='vp-langs' value='${esc(v.languages||'')}'></div><div class='field'><label>Description</label><textarea id='vp-desc' rows='3'>${esc(v.description||'')}</textarea></div><button class='btn' onclick='saveProfile()'>Save profile</button>`);},
  'affiliate:overview':async(m)=>{const a=await api('/api/affiliates/me');const b=await api('/api/bookings');const w=await api('/api/wallets/me').catch(()=>({balance:0}));m.innerHTML=`<div class='stats'><div class='stat'><div class='n'>${a.clicks}</div><div class='l'>Clicks</div></div><div class='stat'><div class='n'>${b.length}</div><div class='l'>Bookings</div></div><div class='stat'><div class='n'>${money(w.balance)}</div><div class='l'>Earnings</div></div></div>`;},
  'affiliate:link':async(m)=>{const a=await api('/api/affiliates/me');const link=a.link;m.innerHTML=card(`<h3>Your referral link</h3><div class='linkbox'><input id='aff-link' value='${esc(link)}' readonly><button class='btn sm' onclick='copyLink()'>Copy</button></div><div style='margin-top:16px' class='qr'>${qrSvg(link)}</div><p class='muted' style='font-size:13px;margin-top:10px'>Share this link or QR. Any booking made through it earns you ${(a.commission_rate*100)}% commission.</p>`);},
  'affiliate:bookings':async(m)=>{const b=await api('/api/bookings');m.innerHTML=bookingsTable(b);},
  'affiliate:wallet':async(m)=>{await walletView(m);},
};
async function walletView(m){const w=await api('/api/wallets/me');m.innerHTML=card(`<h3>Wallet</h3><div class='n' style='font-size:30px;font-weight:800;color:var(--blue)'>${money(w.balance)}</div><div class='linkbox' style='max-width:320px'><input id='po-amt' type='number' placeholder='Amount to withdraw'><button class='btn sm' onclick='requestPayout()'>Request payout</button></div>`)+`<h3 style='margin-top:20px'>Transactions</h3>${tbl(['Date','Type','Amount','Ref'],w.transactions.map(t=>[t.created_at.slice(0,10),t.type,money(t.amount),t.ref||'']))}`;}
function tbl(head,rows){return `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')||`<tr><td colspan='${head.length}' class='muted'>No data</td></tr>`}</tbody></table>`;}
function statusTag(s){return `<span class='tag ${s}'>${s}</span>`;}
function bookingsTable(b,actions){return tbl(['Ref','Trip','Date','Pax','Amount','Status'].concat(actions?['Action']:[]),b.map(x=>['<b>'+x.ref+'</b>',esc(x.service_title||''),x.date||'—',x.pax,money(x.amount),statusTag(x.status)].concat(actions?[`<button class='btn sm' onclick='setBooking(${x.id},"confirmed")'>Confirm</button> <button class='btn sm ghost' onclick='setBooking(${x.id},"completed")'>Complete</button>`]:[])));}
let CATCACHE=null;async function ensureCats(){if(!CATCACHE)CATCACHE=await api('/api/categories');return CATCACHE;}
function catName(id){const c=(CATCACHE||[]).find(x=>x.id===id);return c?esc(c.labels.en||c.key):'—';}

async function setVendor(id,st){try{await api('/api/vendors/'+id+'/status',{method:'PUT',body:{status:st}});toast('Updated');loadSec();}catch(e){toast(e.message);}}
async function setBooking(id,st){try{await api('/api/bookings/'+id+'/status',{method:'PUT',body:{status:st}});toast('Booking '+st);loadSec();}catch(e){toast(e.message);}}
async function delService(id){if(!confirm('Delete this service?'))return;try{await api('/api/services/'+id,{method:'DELETE'});toast('Deleted');loadSec();}catch(e){toast(e.message);}}
async function delAff(id){if(!confirm('Remove marketer?'))return;try{await api('/api/affiliates/'+id,{method:'DELETE'});toast('Removed');loadSec();}catch(e){toast(e.message);}}
async function delBanner(id){if(!confirm('Delete banner?'))return;try{await api('/api/banners/'+id,{method:'DELETE'});toast('Deleted');loadSec();}catch(e){toast(e.message);}}
async function saveProfile(){try{await api('/api/vendors/me',{method:'PUT',body:{name:v('vp-name'),city:v('vp-city'),languages:v('vp-langs'),description:v('vp-desc')}});toast('Profile saved');}catch(e){toast(e.message);}}
async function requestPayout(){try{await api('/api/payouts',{method:'POST',body:{amount:Number(v('po-amt'))}});toast('Payout requested');loadSec();}catch(e){toast(e.message);}}
function v(id){return document.getElementById(id).value;}

async function openService(id){await ensureCats();SF_IMGS=[];document.getElementById('sf-cat').innerHTML=CATCACHE.map(c=>`<option value='${c.key}'>${esc(c.labels.en||c.key)}</option>`).join('');
  if(id){const s=await api('/api/services/'+id);document.getElementById('svc-title').textContent='Edit service';document.getElementById('sf-id').value=s.id;document.getElementById('sf-title').value=s.title;document.getElementById('sf-loc').value=s.location||'';document.getElementById('sf-price').value=s.price;document.getElementById('sf-dur').value=s.duration||'';document.getElementById('sf-desc').value=s.description||'';document.getElementById('sf-feat').checked=!!s.featured;SF_IMGS=s.images.slice();const c=CATCACHE.find(x=>x.id===s.category_id);if(c)document.getElementById('sf-cat').value=c.key;}
  else{document.getElementById('svc-title').textContent='New service';['sf-id','sf-title','sf-loc','sf-price','sf-dur','sf-desc'].forEach(x=>document.getElementById(x).value='');document.getElementById('sf-feat').checked=false;}
  renderSfImgs();openModal('svc-modal');}
function renderSfImgs(){document.getElementById('sf-imgs').innerHTML=SF_IMGS.map((u,i)=>`<div class='th' style='background-image:url(${u})'><b onclick='SF_IMGS.splice(${i},1);renderSfImgs()'>×</b></div>`).join('');}
function sfUpload(e){[...e.target.files].forEach(f=>{const r=new FileReader();r.onload=()=>{SF_IMGS.push(r.result);renderSfImgs();};r.readAsDataURL(f);});e.target.value='';}
async function saveService(){const id=document.getElementById('sf-id').value;const body={title:v('sf-title'),category_key:v('sf-cat'),location:v('sf-loc'),price:Number(v('sf-price'))||0,duration:v('sf-dur'),description:v('sf-desc'),featured:document.getElementById('sf-feat').checked,images:SF_IMGS};
  try{if(id)await api('/api/services/'+id,{method:'PUT',body});else await api('/api/services',{method:'POST',body});closeModal('svc-modal');toast('Saved');loadSec();}catch(e){toast(e.message);}}

async function saveMarketer(){try{await api('/api/affiliates',{method:'POST',body:{name:v('mk-name'),email:v('mk-email'),password:v('mk-pass')||undefined,commission_rate:(Number(v('mk-rate'))||5)/100,code:v('mk-code')||undefined}});closeModal('mkt-modal');['mk-name','mk-email','mk-pass','mk-code'].forEach(x=>document.getElementById(x).value='');toast('Marketer created');loadSec();}catch(e){toast(e.message);}}

async function openBanner(id){const svc=await api('/api/services');document.getElementById('bn-svc').innerHTML=`<option value=''>— none —</option>`+svc.map(s=>`<option value='${s.id}'>${esc(s.title)}</option>`).join('');
  if(id){const b=(await api('/api/banners?all=1')).find(x=>x.id===id);document.getElementById('ban-title').textContent='Edit banner';document.getElementById('bn-id').value=b.id;document.getElementById('bn-title').value=b.title||'';document.getElementById('bn-image').value=b.image||'';document.getElementById('bn-svc').value=b.service_id||'';document.getElementById('bn-active').checked=!!b.active;}
  else{document.getElementById('ban-title').textContent='New banner';['bn-id','bn-title','bn-image'].forEach(x=>document.getElementById(x).value='');document.getElementById('bn-active').checked=true;}
  openModal('ban-modal');}
async function saveBanner(){const id=document.getElementById('bn-id').value;const body={title:v('bn-title'),image:v('bn-image'),service_id:v('bn-svc')||null,active:document.getElementById('bn-active').checked};try{if(id)await api('/api/banners/'+id,{method:'PUT',body});else await api('/api/banners',{method:'POST',body});closeModal('ban-modal');toast('Saved');loadSec();}catch(e){toast(e.message);}}

function copyLink(){const el=document.getElementById('aff-link');el.select();navigator.clipboard.writeText(el.value).then(()=>toast('Copied'));}
function qrSvg(text){let h=0;for(let i=0;i<text.length;i++)h=(h*31+text.charCodeAt(i))>>>0;const n=21,cell=8;let rects='';for(let y=0;y<n;y++)for(let x=0;x<n;x++){const fin=(x<7&&y<7)||(x>=n-7&&y<7)||(x<7&&y>=n-7);const on=fin?((x===0||x===6||y===0||y===6||(x>=2&&x<=4&&y>=2&&y<=4))):(((h>>((x*3+y*5)%31))&1)&&((x+y)%2===0||((h>>(x%13))&1)));if(on)rects+=`<rect x='${x*cell}' y='${y*cell}' width='${cell}' height='${cell}'/>`;}return `<svg width='${n*cell}' height='${n*cell}' xmlns='http://www.w3.org/2000/svg'><rect width='100%' height='100%' fill='#fff'/><g fill='#159A8F'>${rects}</g></svg>`;}

renderAuth();loadSlider();loadCats();loadServices();
